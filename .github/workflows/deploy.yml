name: Deploy production site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  deploy:
    if: vars.NAMECHEAP_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://drcolinmacleod.com

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check project
        run: npm run check

      - name: Build site
        run: npm run build
        env:
          PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.PUBLIC_TURNSTILE_SITE_KEY }}

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.NAMECHEAP_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.NAMECHEAP_KNOWN_HOSTS }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/namecheap_deploy
          chmod 600 ~/.ssh/namecheap_deploy
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Clear interrupted rsync processes
        run: |
          ssh -i ~/.ssh/namecheap_deploy \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -p 21098 \
            drcohmrh@business81.web-hosting.com \
            "pkill -f 'rsync --serve[r]' 2>/dev/null || true"

      - name: Deploy with rsync
        run: |
          rsync -az --delete --timeout=300 --stats \
            --exclude '.well-known/' \
            -e "ssh -i ~/.ssh/namecheap_deploy -o BatchMode=yes -o IdentitiesOnly=yes -p 21098" \
            dist/ \
            drcohmrh@business81.web-hosting.com:~/public_html/

      - name: Verify production
        run: |
          curl_args=(
            --silent
            --show-error
            --location
            --connect-timeout 10
            --max-time 30
            --user-agent "Mozilla/5.0 (compatible; DrColinMacleod-Deployment-Check/1.0)"
            --header "Accept: text/html,application/xhtml+xml"
            --header "Accept-Language: en-CA,en;q=0.9"
            --header "Cache-Control: no-cache"
          )

          for attempt in {1..12}; do
            home_status="$(curl "${curl_args[@]}" --output /tmp/home.html --write-out '%{http_code}' https://drcolinmacleod.com/ || true)"
            policy_status="$(curl "${curl_args[@]}" --output /tmp/editorial-policy.html --write-out '%{http_code}' https://drcolinmacleod.com/editorial-policy/ || true)"
            herbal_status="$(curl "${curl_args[@]}" --output /tmp/herbal-medicine.html --write-out '%{http_code}' https://drcolinmacleod.com/herbal-medicine/ || true)"

            echo "Verification attempt $attempt/12: home=$home_status editorial-policy=$policy_status herbal-medicine=$herbal_status"

            if [[ "$home_status" == "200" ]] \
              && grep -q 'Look beyond symptoms' /tmp/home.html \
              && [[ "$policy_status" == "200" ]] \
              && grep -q 'Editorial and Evidence Policy' /tmp/editorial-policy.html \
              && [[ "$herbal_status" == "200" ]]; then
              echo "Production verification passed."
              exit 0
            fi

            echo "Waiting for production to serve the new build..."
            sleep 10
          done
          echo "Production verification did not observe the new build."
          exit 1
